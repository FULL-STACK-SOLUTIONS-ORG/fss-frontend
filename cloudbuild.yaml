steps:
  
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "========================================="
        echo "🔍 Build Configuration Validation"
        echo "========================================="
        echo "API URL: ${_API_URL}"
        if [ -z "${_API_URL}" ] || [ "${_API_URL}" = "http://localhost:8080/api" ]; then
          echo "❌ ERROR: _API_URL is not set or using default localhost"
          echo "Please provide production API URL using --substitutions=_API_URL=<your-backend-url>"
          exit 1
        fi
        echo "✓ API URL is configured correctly"
        echo "========================================="

  
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'VITE_API_URL=${_API_URL}'

  
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/fss-frontend:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/fss-frontend:$SHORT_SHA'
      - '.'

  
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/fss-frontend'

  
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fss-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/fss-frontend:latest'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '80'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'


substitutions:
  _API_URL: 'https://fss-backend-338962619538.us-central1.run.app/api'
  _REGION: 'us-central1'


images:
  - 'gcr.io/$PROJECT_ID/fss-frontend:latest'
  - 'gcr.io/$PROJECT_ID/fss-frontend:$SHORT_SHA'


timeout: '1200s'

